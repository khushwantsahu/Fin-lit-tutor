
version: '3.8'

services:
  app:
    build: .
    container_name: finsakhi-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/finliteracy.db
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  data:
  instance:
  logs:
