
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Fin-Lit-Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
  <style>
    .profile-page { max-width: 700px; margin: 80px auto 40px; padding: 0 20px; }
    .avatar-ring { width: 80px; height: 80px; background: var(--gradient-main); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: var(--shadow-neon); }
  </style>
</head>
<body>
<nav class="navbar-fin">
  <div class="container-fluid px-3">
    <div class="d-flex align-items-center justify-content-between">
      <a href="/" class="navbar-brand-fin gradient-text" style="text-decoration:none;font-size:1.2rem;"><div class="nav-logo" style="width:30px;height:30px;font-size:15px;">💰</div>Fin-Lit-Tutor</a>
      <a href="{{ url_for('main.dashboard') }}" class="btn-neon-outline" style="padding:6px 14px;font-size:0.8rem;">← Dashboard</a>
    </div>
  </div>
</nav>
<div class="profile-page">
  <div class="text-center mb-5">
    <div class="avatar-ring mx-auto mb-3">{{ user.name[0] | upper }}</div>
    <h1 class="heading-md gradient-text">{{ user.name }}</h1>
    <p class="text-muted">{{ user.email }}</p>
    <span class="badge-fin">{{ user.xp_points or 0 }} XP • {{ user.financial_level | capitalize }}</span>
  </div>
  <div class="glass-card p-4 mb-4">
    <h5 style="font-weight:700;margin-bottom:20px;">Edit Profile</h5>
    <div id="successMsg" class="alert-success mb-3" style="display:none;">✅ Profile updated successfully!</div>
    <div class="mb-3"><label class="form-label-fin">Full Name</label><input type="text" id="profileName" class="form-fin" value="{{ user.name }}"></div>
    <div class="mb-3"><label class="form-label-fin">Phone Number</label><input type="tel" id="profilePhone" class="form-fin" value="{{ user.phone or '' }}" placeholder="+91 9876543210"></div>
    <div class="mb-3">
      <label class="form-label-fin">Preferred Language</label>
      <select id="profileLang" class="form-fin">
        <option value="en" {% if user.language=='en' %}selected{% endif %}>English</option>
        <option value="hi" {% if user.language=='hi' %}selected{% endif %}>हिंदी</option>
        <option value="ta" {% if user.language=='ta' %}selected{% endif %}>தமிழ்</option>
        <option value="te" {% if user.language=='te' %}selected{% endif %}>తెలుగు</option>
        <option value="kn" {% if user.language=='kn' %}selected{% endif %}>ಕನ್ನಡ</option>
        <option value="ml" {% if user.language=='ml' %}selected{% endif %}>മലയാളം</option>
        <option value="mr" {% if user.language=='mr' %}selected{% endif %}>मराठी</option>
        <option value="gu" {% if user.language=='gu' %}selected{% endif %}>ગુજરાતી</option>
        <option value="bn" {% if user.language=='bn' %}selected{% endif %}>বাংলা</option>
        <option value="pa" {% if user.language=='pa' %}selected{% endif %}>ਪੰਜਾਬੀ</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label-fin">Financial Knowledge Level</label>
      <select id="profileLevel" class="form-fin">
        <option value="beginner" {% if user.financial_level=='beginner' %}selected{% endif %}>Beginner</option>
        <option value="intermediate" {% if user.financial_level=='intermediate' %}selected{% endif %}>Intermediate</option>
        <option value="advanced" {% if user.financial_level=='advanced' %}selected{% endif %}>Advanced</option>
      </select>
    </div>
    <div class="mb-4"><label class="form-label-fin">Monthly Income (₹, for Budget Planner)</label><input type="number" id="profileIncome" class="form-fin" value="{{ user.monthly_income or '' }}" placeholder="50000"></div>
    <button onclick="saveProfile()" class="btn-neon w-100" style="padding:13px;">💾 Save Profile</button>
  </div>
  <div class="glass-card p-4">
    <h5 style="font-weight:700;margin-bottom:16px;">🔒 Change Password</h5>
    <div class="mb-3"><label class="form-label-fin">Current Password</label><input type="password" id="oldPwd" class="form-fin" placeholder="Current password"></div>
    <div class="mb-3"><label class="form-label-fin">New Password</label><input type="password" id="newPwd" class="form-fin" placeholder="Min 8 characters"></div>
    <button onclick="changePassword()" class="btn-neon-outline w-100" style="padding:12px;">Update Password</button>
    <div id="pwdMsg" class="mt-3" style="display:none;font-size:0.85rem;"></div>
  </div>
</div>
<script>
async function saveProfile() {
  const data = {
    name: document.getElementById('profileName').value,
    phone: document.getElementById('profilePhone').value,
    language: document.getElementById('profileLang').value,
    financial_level: document.getElementById('profileLevel').value,
    monthly_income: parseFloat(document.getElementById('profileIncome').value) || null,
  };
  const res = await fetch('/auth/profile', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
  const result = await res.json();
  if (result.success) {
    document.getElementById('successMsg').style.display = 'block';
    setTimeout(() => document.getElementById('successMsg').style.display = 'none', 3000);
  }
}
async function changePassword() {
  const data = { old_password: document.getElementById('oldPwd').value, new_password: document.getElementById('newPwd').value };
  const res = await fetch('/auth/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
  const result = await res.json();
  const msg = document.getElementById('pwdMsg');
  msg.style.display = 'block';
  msg.style.color = result.success ? 'var(--neon-green)' : '#fc8181';
  msg.textContent = result.success ? '✅ Password updated!' : '❌ ' + result.message;
}
</script>
</body>
</html>
