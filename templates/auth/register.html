
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Fin-Lit-Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 480px; padding: 40px 36px; }
    .auth-logo { width: 64px; height: 64px; background: var(--gradient-main); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; box-shadow: var(--shadow-neon); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="glass-card auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo float">💰</div>
      <h1 class="heading-md gradient-text">Join Fin-Lit-Tutor</h1>
      <p class="text-muted mt-2" style="font-size:0.9rem;">Start your financial literacy journey today — free forever</p>
    </div>
    <div id="errorAlert" class="alert-scam mb-3" style="display:none;"><span id="errorMsg"></span></div>
    <form id="registerForm" onsubmit="submitRegister(event)">
      <div class="mb-3">
        <label class="form-label-fin">Full Name</label>
        <input type="text" name="name" class="form-fin" placeholder="Rahul Sharma" required minlength="2">
      </div>
      <div class="mb-3">
        <label class="form-label-fin">Email Address</label>
        <input type="email" name="email" class="form-fin" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label-fin">Password</label>
        <input type="password" name="password" class="form-fin" placeholder="Minimum 8 characters" required minlength="8">
      </div>
      <div class="mb-3">
        <label class="form-label-fin">Preferred Language</label>
        <select name="language" class="form-fin">
          <option value="en">English</option>
          <option value="hi">हिंदी (Hindi)</option>
          <option value="ta">தமிழ் (Tamil)</option>
          <option value="te">తెలుగు (Telugu)</option>
          <option value="kn">ಕನ್ನಡ (Kannada)</option>
          <option value="ml">മലയാളം (Malayalam)</option>
          <option value="mr">मराठी (Marathi)</option>
          <option value="gu">ગુજરાતી (Gujarati)</option>
          <option value="bn">বাংলা (Bengali)</option>
          <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label-fin">Financial Knowledge Level</label>
        <select name="financial_level" class="form-fin">
          <option value="beginner">Beginner – New to digital finance</option>
          <option value="intermediate">Intermediate – Know basics</option>
          <option value="advanced">Advanced – Experienced investor</option>
        </select>
      </div>
      <button type="submit" class="btn-neon w-100" id="regBtn" style="padding:14px;">
        🚀 Create Free Account
      </button>
    </form>
    <p class="text-muted text-center mt-3" style="font-size:0.75rem;">By creating an account, you agree to our terms. General financial literacy only — not financial advice.</p>
    <p class="text-center mt-4" style="font-size:0.875rem;color:var(--text-muted);">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--neon-blue);font-weight:600;">Sign in</a>
    </p>
    <div class="text-center mt-4 pt-4" style="border-top:1px solid var(--border-glass);">
      <a href="{{ url_for('main.index') }}" style="color:var(--text-muted);font-size:0.8rem;">← Back to Home</a>
    </div>
  </div>
</div>
<script>
async function submitRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;
  const form = e.target;
  const data = {
    name: form.name.value,
    email: form.email.value,
    password: form.password.value,
    language: form.language.value,
    financial_level: form.financial_level.value,
  };
  const res = await fetch('/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  const result = await res.json();
  if (result.success) {
    window.location.href = result.redirect;
  } else {
    document.getElementById('errorAlert').style.display = 'block';
    document.getElementById('errorMsg').textContent = '⚠️ ' + result.message;
    btn.textContent = '🚀 Create Free Account';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
